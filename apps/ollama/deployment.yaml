apiVersion: v1
kind: Namespace
metadata:
  name: ai

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai
spec:
  replicas: 1

  selector:
    matchLabels:
      app: ollama

  strategy:
    type: Recreate

  template:
    metadata:
      labels:
        app: ollama

    spec:
      runtimeClassName: nvidia

      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 11434
              protocol: TCP

          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"

            - name: OLLAMA_KEEP_ALIVE
              value: "-1"


            - name: OLLAMA_CONTEXT_LENGTH
              value: "8192"

          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              nvidia.com/gpu: 1

          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama

          readinessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12

          livenessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models
