apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace-manager
  namespace: workspace-system
spec:
  replicas: 1

  selector:
    matchLabels:
      app: workspace-manager

  template:
    metadata:
      labels:
        app: workspace-manager

    spec:
      serviceAccountName: workspace-manager

      containers:
        - name: workspace-manager
          image: cloud-ai-workspace/workspace-manager:0.2.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
